spring:
  datasource:
    url: jdbc:mysql://localhost:3306/formation_management_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  application:
    name: formation-management-system

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.greenbuilding.formation: DEBUG